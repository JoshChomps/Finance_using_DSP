version: '3.8'

services:
  api:
    build: .
    container_name: finsignal-api
    ports:
      - "8000:8000"
    volumes:
      - data_cache:/app/data/cache
    env_file:
      - .env
    environment:
      - FIN_DATA_CACHE=/app/data/cache
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker api.main:app --bind 0.0.0.0:8000
    restart: unless-stopped

  ui:
    build: .
    container_name: finsignal-ui
    ports:
      - "8501:8501"
    volumes:
      - data_cache:/app/data/cache
    env_file:
      - .env
    environment:
      - FIN_DATA_CACHE=/app/data/cache
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data_cache:
    driver: local
